<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Interactive Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <section class="header-top py-2">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-6 col-md-2">
                        <a href="index.html" class="logo-anim">
                            <img src="images/logo.png" width="81px" height="80px" alt="logo" loading="lazy">
                        </a>
                    </div>

                    <div class="col-6 col-md-10 d-flex justify-content-end align-items-center">
                        <nav class="navbar desktop-menu d-none d-lg-block">
                            <ul class="d-flex gap-4">
                                <li><a href="#" class="nav-item-anim">About Us</a></li>
                                <li><a href="#" class="nav-item-anim">Services</a></li>
                                <li><a href="#" class="nav-item-anim">Industries</a></li>
                                <li><a href="#" class="nav-item-anim">Countries of Operation</a></li>
                                <li><a href="#" class="nav-item-anim">Contact</a></li>
                            </ul>
                        </nav>

                        <div class="btn-menu-trigger d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                            <i class="bi bi-list"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title text-white">Menu</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Industries</a></li>
                    <li><a href="#">Countries of Operation</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
